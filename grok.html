<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-blue: #00f0ff;
            --bg-dark: #050510;
            --glass-bg: rgba(20, 20, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Effects */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.15), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulse-bg 6s infinite alternate;
        }

        @keyframes pulse-bg {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }

        .grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* Main Card */
        .glass-card {
            width: 90%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(188, 19, 254, 0.2);
            position: relative;
            transition: transform 0.5s ease;
        }

        /* Logo Animation */
        .logo-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
            z-index: 2;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            z-index: 1;
        }

        .ring-1 {
            width: 120%;
            height: 120%;
            border-top: 2px solid var(--neon-purple);
            border-bottom: 2px solid var(--neon-purple);
            animation: spin 4s linear infinite;
        }

        .ring-2 {
            width: 140%;
            height: 140%;
            border-left: 2px solid var(--neon-blue);
            border-right: 2px solid var(--neon-blue);
            animation: spin 6s linear infinite reverse;
            opacity: 0.7;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Title */
        h1 {
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-purple);
            animation: title-flicker 3s infinite;
        }

        @keyframes title-flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.9; text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-purple); }
        }

        /* Join Button */
        .join-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--neon-purple), #ff00c8);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            animation: pulse-btn 2s infinite;
        }

        @keyframes pulse-btn {
            0% { transform: scale(1); }
            70% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .join-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(188, 19, 254, 0.6);
        }

        .join-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Description */
        .desc-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            border-left: 3px solid var(--neon-blue);
            margin-bottom: 20px;
        }

        .desc-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.5;
            color: #e0e0ff;
        }

        .desc-item:last-child {
            margin-bottom: 0;
        }

        .desc-icon {
            margin-right: 12px;
            font-size: 18px;
            min-width: 20px;
        }

        .highlight {
            color: var(--neon-blue);
            font-weight: 600;
        }

        /* Timer & Footer */
        .timer-container {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }

        #countdown {
            color: var(--neon-blue);
            font-weight: bold;
        }

        .trust-badge {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            .desc-item { font-size: 14px; }
            .glass-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="grid"></div>
    <div class="bg-glow"></div>

    <div class="glass-card" id="tiltCard">
        
        <!-- Logo -->
        <div class="logo-wrapper">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <img src="https://i.ibb.co/QvQ8Bw2T/IMG-20260218-120846-639.jpg" 
                 alt="Trading Thamizhan Logo" 
                 class="logo-img">
        </div>

        <h1>Trading Thamizhan</h1>

        <!-- Join Button -->
        <button class="join-btn" onclick="manualJoin()" id="joinBtn">
            <i class="fab fa-telegram-plane"></i> Join Free Channel
        </button>

        <!-- Description -->
        <div class="desc-box">
            <div class="desc-item">
                <span class="desc-icon">💸</span>
                <span>தினமும் <span class="highlight">₹2K – ₹5K</span> வரை சம்பாதிக்க வாய்ப்பு!</span>
            </div>
            <div class="desc-item">
                <span class="desc-icon">📱</span>
                <span>Mobile மூலம் வீட்டிலிருந்தபடியே earning செய்யலாம்.</span>
            </div>
            <div class="desc-item">
                <span class="desc-icon">⚡</span>
                <span>Simple process + Smart work = <span class="highlight">Daily income</span>.</span>
            </div>
            <div class="desc-item">
                <span class="desc-icon">🚀</span>
                <span>மேலும் தகவல்களுக்கு Telegram join பண்ணிக்கோங்க!</span>
            </div>
        </div>

        <!-- Timer -->
        <div class="timer-container">
            Auto Redirecting in <span id="countdown">10</span>s...
        </div>

        <div class="trust-badge">
            <span><i class="fas fa-shield-alt"></i> Safe & Secure</span>
            <span><i class="fas fa-check-circle"></i> Verified</span>
        </div>

    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const TELEGRAM_LINK = "https://t.me/+YVkPAcoFV70zYTk1";
        const REDIRECT_TIME = 10;

        // Elements
        let timeLeft = REDIRECT_TIME;
        let timerInterval = null;
        let hasRedirected = false;

        const countdownEl = document.getElementById('countdown');
        const joinBtn = document.getElementById('joinBtn');
        const card = document.getElementById('tiltCard');

        // Redirect Function
        function redirectUser(isAuto = true) {
            if (hasRedirected) return;
            hasRedirected = true;

            // Track with Meta Pixel
            if (typeof fbq === 'function') {
                fbq('track', 'clickjoin', { 
                    content_name: 'Trading Thamizhan', 
                    status: isAuto ? 'auto_redirect' : 'manual_click' 
                });
            }

            joinBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Opening Telegram...';
            joinBtn.disabled = true;

            setTimeout(() => {
                window.location.href = TELEGRAM_LINK;
            }, 600);
        }

        // Countdown Timer
        function startCountdown() {
            timerInterval = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    redirectUser(true);
                }
            }, 1000);
        }

        // Manual Join
        function manualJoin() {
            if (hasRedirected) return;
            clearInterval(timerInterval);
            redirectUser(false);
        }

        // 3D Tilt Effect (Desktop only)
        function initTiltEffect() {
            if (window.innerWidth < 768) return;

            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                
                card.style.transition = 'transform 0.1s ease';
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            document.addEventListener('mouseleave', () => {
                card.style.transition = 'transform 0.6s ease';
                card.style.transform = 'rotateY(0deg) rotateX(0deg)';
            });
        }

        // Initialize
        window.onload = function() {
            countdownEl.textContent = timeLeft;
            startCountdown();
            initTiltEffect();
        };
    </script>
</body>
</html>
